<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI副業ラボ 管理画面</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Back Office</p>
          <h1>AI副業ラボ 管理画面</h1>
        </div>
        <div class="top-actions">
          <a class="ghost-btn" href="index.html">投稿ツール</a>
          <button id="exportCsvBtn" class="ghost-btn" type="button">CSV保存</button>
          <button id="clearLogsBtn" class="ghost-btn danger" type="button">ログ削除</button>
        </div>
      </header>

      <section class="metrics-grid">
        <article class="metric-card">
          <span>今日の利用</span>
          <strong id="todayCount">0</strong>
        </article>
        <article class="metric-card">
          <span>7日間の利用</span>
          <strong id="weekCount">0</strong>
        </article>
        <article class="metric-card">
          <span>投稿パック作成</span>
          <strong id="generateCount">0</strong>
        </article>
        <article class="metric-card">
          <span>noteリンククリック</span>
          <strong id="noteOpenCount">0</strong>
        </article>
        <article class="metric-card">
          <span>サムネ保存</span>
          <strong id="thumbDownloadCount">0</strong>
        </article>
      </section>

      <section class="admin-grid">
        <article class="panel admin-panel">
          <div class="output-header">
            <h2>人気タイトル</h2>
            <span id="totalLogs" class="muted"></span>
          </div>
          <div id="popularTitles" class="list-table"></div>
        </article>

        <article class="panel admin-panel">
          <h2>人気タグ</h2>
          <div id="popularTags" class="tag-list"></div>
        </article>
      </section>

      <section class="panel admin-panel">
        <div class="output-header">
          <h2>利用ログ</h2>
          <select id="eventFilter">
            <option value="all">すべて</option>
            <option value="page_view">ページ表示</option>
            <option value="generate_post_pack">投稿パック作成</option>
            <option value="download_thumbnail">サムネ保存</option>
            <option value="open_note">noteリンク</option>
            <option value="copy">コピー</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日時</th>
                <th>操作</th>
                <th>タイトル</th>
                <th>記事タイプ</th>
                <th>価格</th>
                <th>端末</th>
              </tr>
            </thead>
            <tbody id="logTable"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
